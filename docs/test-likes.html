<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><title>likes unit tests</title></head>
<body>
<h1>likes.js unit tests</h1>
<pre id="out"></pre>
<script>window.__likesInited = true;</script>
<script src="exports.js"></script>
<script src="likes.js"></script>
<script>
const out = document.getElementById('out');
const log = (...a) => { out.textContent += a.join(' ') + '\n'; console.log(...a); };
let pass = 0, fail = 0;
function assert(cond, msg) { if (cond) { pass++; log('  ✓', msg); } else { fail++; log('  ✗ FAIL:', msg); } }

// Clean slate
localStorage.removeItem('literature_likes');

log('--- LikeStore basics ---');
const s = new window.LikeStore();
assert(s.count() === 0, 'empty store count is 0');

s.add('https://ex.com/a', {title_zh: 'A', title_en: 'A en', journal: 'Nature', source_date: '2026-04-15'});
assert(s.has('https://ex.com/a'), 'has() returns true after add');
assert(s.count() === 1, 'count is 1 after first add');

s.add('https://ex.com/a', {title_zh: 'A2'});  // duplicate
assert(s.count() === 1, 'duplicate add is idempotent (count stays 1)');
assert(s.data['https://ex.com/a'].title_zh === 'A', 'duplicate add does not overwrite first record');

log('--- toggle ---');
s.toggle('https://ex.com/b', {title_zh: 'B'});
assert(s.has('https://ex.com/b'), 'toggle on missing adds');
s.toggle('https://ex.com/b', {});
assert(!s.has('https://ex.com/b'), 'toggle on existing removes');

s.remove('https://ex.com/a');
assert(s.count() === 0, 'remove deletes entry');

log('--- persistence ---');
s.add('https://ex.com/p', {title_zh: 'P'});
const s2 = new window.LikeStore();
assert(s2.has('https://ex.com/p'), 'new instance loads from localStorage (literature_likes)');
assert(localStorage.getItem('literature_likes') !== null, 'uses literature_likes key');

log('--- list ---');
localStorage.removeItem('literature_likes');
const s3 = new window.LikeStore();
s3.add('https://ex.com/x', {title_zh: 'X', source_date: '2026-04-10'});
s3.add('https://ex.com/y', {title_zh: 'Y', source_date: '2026-04-15'});
const list = s3.list();
assert(list.length === 2, 'list returns all entries');
assert(list[0].link && list[0].title_zh, 'list entries have link + title_zh');

log('--- likeschange event ---');
localStorage.removeItem('literature_likes');
const s4 = new window.LikeStore();
let eventFired = false;
let eventCount = 0;
window.addEventListener('likeschange', function handler(e) {
  eventFired = true;
  eventCount = e.detail && e.detail.count;
  window.removeEventListener('likeschange', handler);
});
s4.toggle('https://ex.com/evt', {title_zh: 'Event test'});
assert(eventFired, 'toggle fires likeschange CustomEvent on window');
assert(eventCount === 1, 'likeschange event detail.count is correct');

log('--- collectAll (combined export) ---');
localStorage.removeItem('literature_bookmarks');
localStorage.removeItem('literature_likes');
localStorage.setItem('literature_bookmarks', JSON.stringify({
  'https://ex.com/bk1': {title_zh: 'BK1', added_at: 1},
  'https://ex.com/both': {title_zh: 'Both', added_at: 2},
}));
localStorage.setItem('literature_likes', JSON.stringify({
  'https://ex.com/lk1': {title_zh: 'LK1', added_at: 3},
  'https://ex.com/both': {title_zh: 'Both-like', added_at: 4},
}));
const all = window.BookmarkExports.collectAll();
assert(Array.isArray(all), 'collectAll returns an array');
assert(all.length === 3, 'collectAll deduplicates by link (3 unique links)');
const links = all.map(x => x.link);
assert(links.includes('https://ex.com/bk1'), 'collectAll includes bookmark-only entry');
assert(links.includes('https://ex.com/lk1'), 'collectAll includes like-only entry');
assert(links.includes('https://ex.com/both'), 'collectAll includes deduped entry');

log('\n--- summary ---');
log(`PASS: ${pass}  FAIL: ${fail}`);
if (fail > 0) document.title = '✗ ' + document.title;
else document.title = '✓ ' + document.title;
</script>
</body></html>
