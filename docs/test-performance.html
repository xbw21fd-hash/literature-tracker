<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能优化测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .test-section h2 {
            margin-top: 0;
            color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }

        button:hover {
            background: #5568d3;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        .info {
            color: #17a2b8;
        }
    </style>
</head>

<body>
    <h1>⚡ 性能优化功能测试</h1>

    <div class="test-section">
        <h2>1. IndexedDB 缓存测试</h2>
        <button onclick="testIndexedDB()">测试 IndexedDB</button>
        <button onclick="clearIndexedDB()">清除缓存</button>
        <div id="indexeddb-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. 倒排索引搜索测试</h2>
        <button onclick="testInvertedIndex()">构建索引</button>
        <button onclick="testSearch()">测试搜索</button>
        <div id="search-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. 对象池测试</h2>
        <button onclick="testObjectPool()">测试对象池</button>
        <div id="pool-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. 性能监控测试</h2>
        <button onclick="testPerformanceMonitor()">测试性能监控</button>
        <button onclick="showPerformancePanel()">显示性能面板</button>
        <div id="monitor-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. 分块加载测试</h2>
        <button onclick="testChunkLoader()">测试分块加载</button>
        <div id="chunk-result" class="result"></div>
    </div>

    <script src="performance-optimization.js"></script>
    <script>
        let testArticles = [];

        // 生成测试数据
        function generateTestArticles(count) {
            const articles = [];
            const keywords = ['machine', 'learning', 'neural', 'network', 'deep', 'artificial', 'intelligence'];
            const journals = ['Nature', 'Science', 'Physical Review', 'JACS'];

            for (let i = 0; i < count; i++) {
                const randomKeywords = keywords.sort(() => 0.5 - Math.random()).slice(0, 3);
                articles.push({
                    id: `test-${i}`,
                    title: `Test Article ${i}: ${randomKeywords.join(' ')}`,
                    title_zh: `测试文章 ${i}`,
                    abstract: `This is a test abstract about ${randomKeywords.join(', ')}. ` + 'Lorem ipsum '.repeat(20),
                    abstract_zh: `这是一篇关于${randomKeywords.join('、')}的测试摘要。`,
                    authors: [`Author ${i}`, `Co-Author ${i}`],
                    journal: journals[i % journals.length],
                    pub_date: `2024-${String((i % 12) + 1).padStart(2, '0')}-01`,
                    link: `https://example.com/article/${i}`
                });
            }
            return articles;
        }

        // 测试 IndexedDB
        async function testIndexedDB() {
            const result = document.getElementById('indexeddb-result');
            result.innerHTML = '测试中...';

            try {
                // 初始化
                await initPerformanceOptimization();

                // 生成测试数据
                testArticles = generateTestArticles(1000);
                result.innerHTML += '\n✅ 生成 1000 篇测试文章';

                // 保存到 IndexedDB
                const startSave = performance.now();
                await indexedDBManager.saveArticles(testArticles);
                const saveDuration = performance.now() - startSave;
                result.innerHTML += `\n✅ 保存耗时: ${saveDuration.toFixed(2)}ms`;
                result.innerHTML += `\n✅ 写入速度: ${(1000 / (saveDuration / 1000)).toFixed(0)} 篇/秒`;

                // 从 IndexedDB 读取
                const startLoad = performance.now();
                const loaded = await indexedDBManager.getAllArticles();
                const loadDuration = performance.now() - startLoad;
                result.innerHTML += `\n✅ 读取耗时: ${loadDuration.toFixed(2)}ms`;
                result.innerHTML += `\n✅ 读取速度: ${(loaded.length / (loadDuration / 1000)).toFixed(0)} 篇/秒`;
                result.innerHTML += `\n✅ 读取数量: ${loaded.length} 篇`;

                // 存储空间
                const storage = await indexedDBManager.getStorageSize();
                result.innerHTML += `\n✅ 存储使用: ${(storage.usage / 1024 / 1024).toFixed(2)} MB / ${(storage.quota / 1024 / 1024).toFixed(2)} MB (${storage.usagePercent}%)`;

                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        async function clearIndexedDB() {
            const result = document.getElementById('indexeddb-result');
            try {
                await indexedDBManager.clear();
                result.innerHTML = '✅ 缓存已清除';
                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        // 测试倒排索引
        async function testInvertedIndex() {
            const result = document.getElementById('search-result');
            result.innerHTML = '测试中...';

            try {
                if (testArticles.length === 0) {
                    testArticles = generateTestArticles(1000);
                }

                // 构建索引
                const startBuild = performance.now();
                invertedIndexSearchEngine.buildIndex(testArticles);
                const buildDuration = performance.now() - startBuild;

                const stats = invertedIndexSearchEngine.getIndexStats();

                result.innerHTML = `✅ 索引构建完成`;
                result.innerHTML += `\n✅ 构建耗时: ${buildDuration.toFixed(2)}ms`;
                result.innerHTML += `\n✅ 文档数量: ${stats.totalDocuments}`;
                result.innerHTML += `\n✅ 词汇数量: ${stats.totalWords}`;
                result.innerHTML += `\n✅ 平均词数: ${stats.avgWordsPerDoc.toFixed(2)}`;
                result.innerHTML += `\n✅ 内存占用: ${stats.memoryUsage.mb} MB`;

                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        async function testSearch() {
            const result = document.getElementById('search-result');

            try {
                const queries = ['machine learning', 'neural network', 'deep learning'];
                result.innerHTML = '搜索测试:\n';

                for (const query of queries) {
                    const startSearch = performance.now();
                    const results = invertedIndexSearchEngine.search(query);
                    const searchDuration = performance.now() - startSearch;

                    result.innerHTML += `\n"${query}": ${results.length} 个结果, ${searchDuration.toFixed(2)}ms`;
                }

                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        // 测试对象池
        function testObjectPool() {
            const result = document.getElementById('pool-result');
            result.innerHTML = '测试中...';

            try {
                // 测试获取和释放
                const startTime = performance.now();
                const nodes = [];

                for (let i = 0; i < 100; i++) {
                    nodes.push(domNodePool.acquire());
                }

                const acquireTime = performance.now() - startTime;

                for (const node of nodes) {
                    domNodePool.release(node);
                }

                const releaseTime = performance.now() - startTime - acquireTime;

                const stats = domNodePool.getStats();

                result.innerHTML = `✅ 对象池测试完成`;
                result.innerHTML += `\n✅ 获取100个节点: ${acquireTime.toFixed(2)}ms (${(acquireTime / 100).toFixed(2)}ms/个)`;
                result.innerHTML += `\n✅ 释放100个节点: ${releaseTime.toFixed(2)}ms`;
                result.innerHTML += `\n✅ 创建数量: ${stats.created}`;
                result.innerHTML += `\n✅ 获取数量: ${stats.acquired}`;
                result.innerHTML += `\n✅ 释放数量: ${stats.released}`;
                result.innerHTML += `\n✅ 复用数量: ${stats.reused}`;
                result.innerHTML += `\n✅ 复用率: ${stats.reuseRate}`;
                result.innerHTML += `\n✅ 池大小: ${stats.poolSize}/${stats.maxSize}`;

                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        // 测试性能监控
        function testPerformanceMonitor() {
            const result = document.getElementById('monitor-result');

            try {
                performanceMonitor.start('测试任务');

                // 模拟一些工作
                let sum = 0;
                for (let i = 0; i < 1000000; i++) {
                    sum += i;
                }

                const duration = performanceMonitor.end('测试任务');

                const metrics = performanceMonitor.getMetrics();

                result.innerHTML = `✅ 性能监控测试完成`;
                result.innerHTML += `\n✅ 测试任务耗时: ${duration.toFixed(2)}ms`;
                result.innerHTML += `\n\n📊 当前指标:`;

                for (const [name, data] of Object.entries(metrics)) {
                    if (typeof data.current === 'number') {
                        result.innerHTML += `\n  ${name}: ${data.current.toFixed(2)}ms`;
                    }
                }

                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        function showPerformancePanel() {
            performanceMonitor.showPanel();
        }

        // 测试分块加载
        async function testChunkLoader() {
            const result = document.getElementById('chunk-result');
            result.innerHTML = '测试中...';

            try {
                const loader = new ChunkLoader(100);
                const testData = generateTestArticles(500);

                result.innerHTML = `✅ 生成 500 篇测试文章`;

                // 模拟分块加载
                let loadedCount = 0;
                const startTime = performance.now();

                for (let i = 0; i < 5; i++) {
                    const chunk = testData.slice(i * 100, (i + 1) * 100);
                    loadedCount += chunk.length;
                    result.innerHTML += `\n✅ 加载块 ${i + 1}/5: ${chunk.length} 篇`;
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                const totalTime = performance.now() - startTime;

                result.innerHTML += `\n\n✅ 总耗时: ${totalTime.toFixed(2)}ms`;
                result.innerHTML += `\n✅ 平均速度: ${(loadedCount / (totalTime / 1000)).toFixed(0)} 篇/秒`;

                result.className = 'result success';
            } catch (error) {
                result.innerHTML = `❌ 错误: ${error.message}`;
                result.className = 'result error';
            }
        }

        // 初始化
        window.addEventListener('load', async () => {
            try {
                await initPerformanceOptimization();
                console.log('✅ 性能优化模块已初始化');
            } catch (error) {
                console.error('❌ 初始化失败:', error);
            }
        });
    </script>
</body>

</html>
