name: Generate Deep Read + Posters + Feed
on:
  workflow_dispatch:
    inputs:
      window:
        description: "回看天数"
        default: "1"
  schedule:
    - cron: "30 3 * * *"
permissions:
  contents: write
concurrency:
  group: generate-deep
  cancel-in-progress: false
jobs:
  deep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      # Daily FIRST: regenerates daily pages (今日精读 from existing aps_*.json) and writes the
      # corrected arxiv_tier2_<date>.json candidates that run_deep then enriches SAME run.
      - name: Generate daily pages (writes tier2 candidates)
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: aigw
          AI_MODEL: gpt-5.5
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_TIMEOUT_SECONDS: "300"
          AI_RESPONSE_JSON: "1"
          AI_DAILY_MAX_PER_CALL: "20"
          AI_DAILY_WAIT_MAX_SECONDS: "1800"
        run: python generate_daily_pages.py --days 4 --force
      # run_deep SECOND: APS full-text deep+poster, enrich tier2 (abstract-level + infographic),
      # sole writer of arxiv_core_<date>.json (deep_analysis/image/poster_elements) — no clobber.
      - name: Run deep pipeline (enrich arxiv_core/aps)
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: aigw
          AI_MODEL: gpt-5.5
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          IMAGE_API_KEY: ${{ secrets.AI_API_KEY }}
          IMAGE_API_BASE: ${{ secrets.AI_BASE_URL }}
          APS_HTTP_BASE: ${{ secrets.APS_HTTP_BASE }}
          APS_HTTP_USER: ${{ secrets.APS_HTTP_USER }}
          APS_HTTP_PASS: ${{ secrets.APS_HTTP_PASS }}
          DEEP_WINDOW_DAYS: ${{ github.event.inputs.window || '4' }}
          AI_TIMEOUT_SECONDS: "600"
          AI_MAX_RETRIES: "2"
        run: python run_deep.py
      # THIRD: re-render daily HTML so TODAY's pages pick up the enrichment run_deep just wrote
      # (daily ran BEFORE run_deep, so its pages had no arxiv_core yet). No AI / no fetch.
      - name: Re-render daily pages with fresh enrichment
        run: python generate_daily_pages.py --rerender-only --days 4
      - name: Commit and push (race-safe)
        run: |
          git config user.email action@github.com
          git config user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "📖 Deep read + posters + feed"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main || { git rebase --abort; exit 1; }
            if git push origin main; then echo "pushed on attempt $i"; exit 0; fi
            sleep 5
          done
          echo "push failed after 5 attempts"; exit 1
