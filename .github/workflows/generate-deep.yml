name: Generate Deep Read + Posters + Feed
on:
  workflow_dispatch:
    inputs:
      window:
        description: "回看天数"
        default: "1"
  schedule:
    - cron: "30 3 * * *"
permissions:
  contents: write
concurrency:
  group: generate-deep
  cancel-in-progress: false
jobs:
  deep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run deep pipeline
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: aigw
          AI_MODEL: gpt-5.5
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          IMAGE_API_KEY: ${{ secrets.AI_API_KEY }}
          IMAGE_API_BASE: ${{ secrets.AI_BASE_URL }}
          APS_HTTP_BASE: ${{ secrets.APS_HTTP_BASE }}
          APS_HTTP_USER: ${{ secrets.APS_HTTP_USER }}
          APS_HTTP_PASS: ${{ secrets.APS_HTTP_PASS }}
          DEEP_WINDOW_DAYS: ${{ github.event.inputs.window || '4' }}
          AI_TIMEOUT_SECONDS: "600"
          AI_MAX_RETRIES: "2"
        run: python run_deep.py
      - name: Regenerate daily pages (insert 今日精读)
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: aigw
          AI_MODEL: gpt-5.5
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: python generate_daily_pages.py --days 3
      - name: Commit and push (race-safe)
        run: |
          git config user.email action@github.com
          git config user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "📖 Deep read + posters + feed"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main || { git rebase --abort; exit 1; }
            if git push origin main; then echo "pushed on attempt $i"; exit 0; fi
            sleep 5
          done
          echo "push failed after 5 attempts"; exit 1
