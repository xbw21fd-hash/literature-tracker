name: 定时抓取文献 + 每日摘要

on:
  schedule:
    # UTC 0:00,12:00 (北京时间 08:00、20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行优化同步（AI筛选）
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_ZH_MAX_ITEMS: "120"
          AI_RELEVANCE_BATCH_SIZE: "20"
          AI_RELEVANCE_THRESHOLD: "6"
          AI_RELEVANCE_INCLUDE_TODAY: "0"
          AI_NOTIFY_MAX: "0"
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_LIT_PARENT_ID: ${{ secrets.NOTION_LIT_PARENT_ID }}
          TG_LIT_BOT_TOKEN: ${{ secrets.TG_LIT_BOT_TOKEN }}
          TG_LIT_CHAT_ID: ${{ secrets.TG_LIT_CHAT_ID }}
        run: python run_optimized_sync.py

      - name: 生成每日摘要页面（AI筛选）
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_DAILY_MAX_PER_CALL: "20"
        run: |
          # 回填最近一周：避免 RSS 晚到/Actions 偶发失败导致「每日摘要缺失或不完整」
          python generate_daily_pages.py --days 7

      - name: 复制数据到docs目录
        run: |
          mkdir -p docs/data
          if [ -d "data" ]; then
            cp -r data/* docs/data/
          fi

      - name: 提交更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "📚 自动更新文献 $(date +'%Y-%m-%d %H:%M')"
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push origin main

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
      - name: 拉取最新代码
        run: git pull origin main
      - name: 设置Pages
        uses: actions/configure-pages@v4
      - name: 上传artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
