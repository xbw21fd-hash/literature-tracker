name: 定时抓取文献 + 每日摘要

on:
  schedule:
    # UTC 0:00,12:00 (北京时间 08:00、20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行优化同步（AI筛选）
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          OPENROUTER_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_ZH_MAX_ITEMS: "120"
          AI_RELEVANCE_BATCH_SIZE: "20"
          AI_RELEVANCE_THRESHOLD: "6"
          AI_RELEVANCE_INCLUDE_TODAY: "0"
          AI_NOTIFY_MAX: "0"
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_LIT_PARENT_ID: ${{ secrets.NOTION_LIT_PARENT_ID }}
          TG_LIT_BOT_TOKEN: ${{ secrets.TG_LIT_BOT_TOKEN }}
          TG_LIT_CHAT_ID: ${{ secrets.TG_LIT_CHAT_ID }}
        run: python run_optimized_sync.py

      - name: 生成每日摘要页面（AI筛选）
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          OPENROUTER_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_RESPONSE_JSON: "1"
          AI_DAILY_MAX_PER_CALL: "20"
          # 减少等待时间，允许降级生成（避免日报缺失）
          AI_DAILY_WAIT_MAX_SECONDS: "300"
          AI_DAILY_WAIT_BASE_SECONDS: "10"
          AI_DAILY_WAIT_MAX_SLEEP_SECONDS: "60"
          # 移除NO_FALLBACK：API失败时降级生成列表式日报
        run: |
          # 验证API配置（隐藏密钥）
          if [ -n "$AI_API_KEY" ]; then
            echo "✅ AI_API_KEY已设置"
          else
            echo "⚠️ 警告: AI_API_KEY未设置，将使用降级模式生成日报"
          fi
          echo "AI提供商: $AI_PROVIDER"
          echo "AI模型: $AI_MODEL"
          # 回填最近 2 天：覆盖 RSS 晚到，但不重跑整周
          # 需要更长窗口的回填请手动 dispatch backfill-daily.yml（接受 days/force 参数）
          python generate_daily_pages.py --days 2

      - name: 提交更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "📚 自动更新文献 $(date +'%Y-%m-%d %H:%M')"
          # race-safe push: rebase onto moved origin/main and retry (parallel workflows push to main)
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main || { git rebase --abort; exit 1; }
            if git push origin main; then echo "pushed on attempt $i"; exit 0; fi
            sleep 5
          done
          echo "push failed after 5 attempts"; exit 1

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
      - name: 拉取最新代码
        run: git pull origin main
      - name: 准备docs数据(docs/data 不入库,部署期从 data/ 复制)
        run: |
          mkdir -p docs/data
          if [ -d "data" ]; then
            cp -r data/* docs/data/
          fi
      - name: 设置Pages
        uses: actions/configure-pages@v4
      - name: 上传artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
